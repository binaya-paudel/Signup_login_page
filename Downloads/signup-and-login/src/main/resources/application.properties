spring.application.name=signup-and-login
spring.config.import=optional:classpath:.env

app.jwt.secret= ${appjwtsecret}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-days=30

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username= ${mailusername}
spring.mail.password= ${mailpassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# reset token expiry
app.reset-token.expiry-minutes=15
app.frontend.url=http://localhost:3000

spring.datasource.url=jdbc:postgresql://localhost:5432/InternProjectSignupandLogin
spring.datasource.username= ${dbusername}
spring.datasource.password= ${dbpassword}
spring.jpa.show-sql=true

